spring.application.name=Sistema-de-gestao-de-funcionarios

//Config do Banco de Dados
# ConfiguraÓÐo da Base de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/data_sistem?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

